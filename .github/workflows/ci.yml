name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -c "from app.database import init_db; import asyncio; asyncio.run(init_db())"
      - run: python -c "from app.config import settings; print(f'Config OK: {settings.gaggimate_host}:{settings.gaggimate_ws_port}')"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install aiohttp websockets
      - run: pip install -e "./backend[dev]"
      - name: Start simulator
        run: python simulator/gaggimate_sim.py --ws-port 8765 --webhook-url http://localhost:8000/webhook &
      - name: Start backend
        run: |
          sleep 2
          cd backend && python -m uvicorn app.main:app --port 8000 &
          sleep 5
      - name: Run integration tests
        run: python tests/test_integration.py
